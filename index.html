<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>I'm Sorry ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Poppins,sans-serif}
body{display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#ffd6e7,#ffc0d8)}
#bg{position:fixed;inset:0;overflow:hidden}
.heart{position:absolute;bottom:-40px;color:#ff5c93;animation:float linear forwards;opacity:.8}
@keyframes float{to{transform:translateY(-120vh);opacity:0}}
.card{width:min(90vw,360px);background:rgba(255,255,255,.82);backdrop-filter:blur(10px);border-radius:28px;padding:28px;text-align:center;box-shadow:0 15px 40px rgba(0,0,0,.15)}
h1{font:700 44px "Dancing Script",cursive;color:#ff4d88;margin:0 0 10px}
button{border:0;background:#ff5c93;color:#fff;padding:14px 26px;border-radius:999px;font-size:16px}
#letter{display:none;text-align:left}
#typed{white-space:pre-wrap;line-height:1.8;color:#555;min-height:240px}
.center{text-align:center}
</style></head>
<body>
<div id="bg"></div>
<div class="card" id="start">
<h1>I'm Sorry 💗</h1>
<p>I have something from my heart...</p>
<button onclick="openLetter()">Open My Heart ❤️</button>
</div>
<div class="card" id="letter">
<h1>To My Love 💕</h1>
<div id="typed"></div>
<div class="center" style="margin-top:18px;font-size:28px">❤️</div>
</div>
<script>
const msg=`My love,

I'm truly sorry for hurting you.

I never wanted to make you feel sad or disappointed.

Please don't leave me. I need you by my side.

Please forgive me and give me a chance to make things right.

I love you. Always. ❤️`;
function openLetter(){
 if(navigator.vibrate) navigator.vibrate(50);
 start.style.display='none'; letter.style.display='block';
 let i=0; const t=document.getElementById('typed');
 const iv=setInterval(()=>{t.textContent+=msg[i++]||''; if(i>msg.length)clearInterval(iv);},35);
}
setInterval(()=>{
 let h=document.createElement('div');
 h.className='heart';h.textContent='❤';
 h.style.left=Math.random()*100+'vw';
 h.style.fontSize=(14+Math.random()*22)+'px';
 h.style.animationDuration=(5+Math.random()*5)+'s';
 bg.appendChild(h); setTimeout(()=>h.remove(),10000);
},250);
</script>
</body></html>
